################################################################################
### Line width
################################################################################
max_width = 120

################################################################################
### Don't aggressively make short things vertical
################################################################################
use_small_heuristics = "Max"

################################################################################
### Allow longer function calls before wrapping
################################################################################
fn_call_width = 100
attr_fn_like_width = 100
struct_lit_width = 40
struct_variant_width = 60
array_width = 100
chain_width = 100
single_line_if_else_max_width = 80

################################################################################
### Keep imports grouped
################################################################################
imports_granularity = "Module"
group_imports = "StdExternalCrate"

################################################################################
### Keep match arms compact when possible
################################################################################
match_arm_blocks = false

################################################################################
### Keep trailing commas cause Rust people like it even if it's dumb
################################################################################
trailing_comma = "Vertical"

################################################################################
### Don't reorder items
################################################################################
reorder_impl_items = false

################################################################################
### Keep where clauses more compact
################################################################################
where_single_line = true

################################################################################
### Normalize comments
################################################################################
normalize_comments = true
normalize_doc_attributes = true
